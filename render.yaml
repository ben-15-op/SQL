services:
  - type: web
    name: minisql-studio
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd ui && npm install && npm run build
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
